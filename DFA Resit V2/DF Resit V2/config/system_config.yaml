mode: offline   # offline or live
filter_type: particle   # particle or discrete_bayes
random_seed: 42

experiment:
  name: log_turn
  output_dir: data/experiments/gyro
  save_plots: true
  compare_models: true

initial_state:
  position: [4.8, 6.25]
  heading: -1.57

map:
  file: data/floor_plans/house_floorplan_pdf.pkl

offline_data:
  csv_file: data/sensor_log_walk_turn90_smooth.csv
  heading_column: heading_rad
  step_column: step_event
  dt_column: dt
  timestamp_column: timestamp
  gyro_column: gyro_z_rads
  gyro_bias_estimate_seconds: 1.5
  fixed_step_length_m: 0.47

live_data:
  sample_rate_hz: 50
  fixed_step_length_m: 0.72
  stride_threshold_g: 1.18
  min_stride_interval_s: 0.30

initialization:
  use_compass_for_initial_heading: true
  compass_average_seconds: 1.5
  map_heading_offset_rad: 2.50

motion_model:
  heading_noise_std_rad: 0.03
  step_length_std_m: 0.03
  forward_bias_std_rad: 0.08
  directional_persistence: 0.98
  impossible_state_penalty: 1.0e-12
  turn_gain: 1.0

particle_filter:
  n_particles: 3000
  resample_threshold_ratio: 0.60
  resample_method: systematic

bayes_filter:
  grid_resolution_xy_m: 0.25
  heading_bins: 24
  transition_spread_cells: 1
  use_stride_ring: true
  stride_ring_sigma_m: 0.18
