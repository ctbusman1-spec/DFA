mode: offline   # offline or live
filter_type: particle   # particle or discrete_bayes
random_seed: 42

experiment:
  name: dfa_resubmission_demo
  output_dir: src/data/experiments
  save_plots: true
  compare_models: true

initial_state:
  position: [5.0, 3.5]
  heading: 0.0

map:
  type: football_field
  file: src/data/floor_plans/football_field_map.pkl
  width_m: 20.0
  height_m: 10.0
  scale_m_per_cell: 0.1
  sigma_cells: 2.5
  edge_decay: 0.55
  center_boost: 0.15

offline_data:
  csv_file: src/data/sensor_log_4.csv
  use_step_column: true
  heading_column: derived_heading
  step_column: step_state
  dt_column: dt
  timestamp_column: timestamp
  fixed_step_length_m: 0.72

live_data:
  sample_rate_hz: 50
  fixed_step_length_m: 0.72
  stride_threshold_g: 1.15
  min_stride_interval_s: 0.30

motion_model:
  heading_noise_std_rad: 0.18
  step_length_std_m: 0.12
  forward_bias_std_rad: 0.25
  directional_persistence: 0.82
  impossible_state_penalty: 0.0

particle_filter:
  n_particles: 2500
  resample_threshold_ratio: 0.55
  resample_method: systematic

bayes_filter:
  grid_resolution_xy_m: 0.25
  heading_bins: 24
  top_k_transitions: 7
  transition_spread_cells: 1
